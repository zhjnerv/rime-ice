patch:
  speller/algebra:
    __patch:
      #- 模糊音                                  # 这里启用后，本文件末尾可配置具体条目
      - wanxiang_algebra:/pro/自然码 # 可选输入方案名称：自然码, 自然龙, 小鹤双拼, 搜狗双拼, 微软双拼, 智能ABC, 紫光双拼, 国标双拼
      - wanxiang_algebra:/pro/直接辅助 #辅助码升级为：直接辅助和间接辅助两种类型，都是句中任意，不同点在于直接辅助是nire=你  而间接则需要/引导  ni/re=你 ，在这个基础上直接辅助支持拼音后任意位置数字声调参与，间接辅助声调在/引导前参与
      - wanxiang_algebra:/自然码提权 #自然码提权，定义在wanxiang_algebra.yaml
  ##########################以上格式受指令初始化控制，最好保持格式不变，如果发生变更请不要使用指令修改相关数据#####################################
  
  #通过下面的设置可以让你自己的文件引入而与仓库custom_phrase.txt不同，防止更新时被仓库文件覆盖
  custom_phrase/user_dict: custom_phrase_double # 这里改成什么就需要手动创建同名的 custom_phrasexx.txt 文件在用户目录，这个文件主要用于置顶，编码为自定义编码的词汇
  custom_phrase/enable_completion: false # 开启自定义短语补全功能，默认关闭
  
  "engine/processors/@before 0": lua_processor@*custom_en_punct # 【自定义】独立标点转换，不随更新覆盖
  
  translator/packs/+:
    - userzhj # 导入根目录下名称为userzhj.dict.yaml的自定义固定词典
  translator/contextual_suggestions: false # 开启上下文预测

  # 英文自动加空格设置
  wanxiang_english/english_spacing: off
  wanxiang_english/spacing_timeout: 0

  #下面是候选数量，未来7890分别代表1234声，请候选长度不要大于6避免冲突
  menu/page_size: 6

  super_comment: # 超级注释模块，子项配置 true 开启，false 关闭
    candidate_length: 2 # 候选词辅助码提醒的生效长度，0为关闭  但同时清空其它，应当使用上面开关来处理
    corrector_type: "〔comment〕" # 随意更换左右括号，比如"〔comment〕" 不加括号为无括号，comment占位不能动
    chaifen: "〔chaifen〕" # 随意更换左右括号，比如"〔chaifen〕" 不加括号为无括号，chaifen占位不能动
    cand_type:
      user_phrase: "⁺"
      sentence: "∞"
      phrase: ""
      table: ""
      user_table: ""
      completion: ""
      abbrev: ""
      predict: "›"
      fallback: "~"

  super_tips:
    db_name: "lua/tips"  # 可选字段，不写的话默认使用 "lua/tips"，相对路径
    tips_key: "comma"    # key英文单词不清楚去default找
    files:                       # 自定义数据文件列表（可选，不配置则使用默认文件）
      - lua/data/tips_show.txt   # 仍可保留默认文件
    disabled_types: []           # 自定义：全开

  #通过在有候选的情况下，通过末尾检测到形如\a来触发为第一候选进行成对符号包裹
  paired_symbols:
    trigger: "\\" #(注意反斜杠这是转义写法\\使用时\单反斜杠即可)
    symkey:
      # ===== 基本括号与引号 =====
      a: "[]" # 方括号
      b: "【】" # 黑方头括号
      c: "❲❳" # 双大括号 / 装饰括号
      d: "〔〕" # 方头括号
      e: "⟮⟯" # 小圆括号 / 装饰括号
      f: "⟦⟧" # 双方括号 / 数学集群括号
      g: "「」" # 直角引号
      i: "『』" # 双直角引号
      j: "<>" # 尖括号
      k: "《》" # 书名号（双）
      l: "〈〉" # 书名号（单）
      m: "‹›" # 法文单书名号
      n: "«»" # 法文双书名号
      o: "⦅⦆" # 白圆括号
      p: "⦇⦈" # 白方括号
      q: "()" # 圆括号
      r: "〖〗" # 花括号扩展 / 装饰括号 (自定义保留)
      s: "［］" # 全角方括号
      t: "⟨⟩" # 数学角括号
      u: "〈〉" # 数学尖括号
      v: "❰❱" # 装饰角括号 (自定义保留)
      w: "（）" # 全角圆括号
      x: "｛｝" # 全角花括号
      y: "⟪⟫" # 双角括号
      z: "{}" # 花括号
      # ===== 扩展括号族 / 引号 =====
      dy: "''" # 英文单引号
      sy: '""' # 英文双引号
      zs: "“”" # 中文弯双引号
      zd: "‘’" # 中文弯单引号
      fy: "``" # 反引号
      # ===== 双字母括号族 =====
      aa: "〚〛" # 双中括号
      bb: "〘〙" # 双中括号（小）
      cc: "〚〛" # 双中括号（重复）
      dd: "❨❩" # 小圆括号装饰
      ee: "❪❫" # 小圆括号装饰
      ff: "❬❭" # 小尖括号装饰
      gg: "⦉⦊" # 双弯方括号
      ii: "⦍⦎" # 双弯方括号
      jj: "⦏⦐" # 双弯方括号
      kk: "⦑⦒" # 双弯方括号
      ll: "❮❯" # 小尖括号装饰
      mm: "⌈⌉" # 上取整 / 数学符号
      nn: "⌊⌋" # 下取整 / 数学符号
      oo: "⦗⦘" # 双方括号装饰
      pp: "⦙⦚" # 双方括号装饰
      qq: "⟬⟭" # 小双角括号
      rr: "❴❵" # 花括号装饰
      ss: "⌜⌝" # 数学上角符号
      tt: "⌞⌟" # 数学下角符号
      uu: "⸢⸣" # 装饰方括号
      vv: "⸤⸥" # 装饰方括号
      ww: "﹁﹂" # 中文书名号
      xx: "﹃﹄" # 中文书名号
      yy: "⌠⌡" # 数学 / 程序符号
      zz: "⟅⟆" # 数学 / 装饰括号
      # ===== Markdown / 标记 =====
      md: "**|**" # Markdown 粗体
      jc: "**|**" # 加粗
      it: "__|__" # 斜体
      st: "~~|~~" # 删除线
      eq: "==|==" # 高亮
      ln: "`|`" # 行内代码
      cb: "```|```" # 代码块
      qt: "> |" # 引用
      ul: "- |" # 无序列表项
      ol: "1. |" # 有序列表项
      lk: "[|](url)" # 链接
      im: "![|](img)" # 图片
      h: "# |" # 一级标题
      hh: "## |" # 二级标题
      hhh: "### |" # 三级标题
      hhhh: "#### |" # 四级标题
      sp: "\\|" # 反斜杠转义
      br: "|  " # 换行
      cm: "<!--|-->" # 注释
      # ===== 运算与标记符 =====
      pl: "++"
      mi: "--"
      sl: "//"
      bs: "\\\\"
      at: "@@"
      dl: "$$"
      pc: "%%"
      an: "&&"
      cr: "^^"
      cl: "::"
      sc: ";;"
      ex: "!!"
      qu: "??"
      sb: "sb"

  #开启用户词典长词组推荐
  user_dict_set/enable_completion: true

  # 标点符号覆盖
  punctuator/full_shape:
    __include: wanxiang_symbols:/symbol_table/full_shape
    "[": [「, 【, "[", "[]", 〔, ［]
    "]": [」, 】, "]", 〕, ］]
    "{": [『, 〖, "{}", ｛]

  punctuator/half_shape:
    __include: wanxiang_symbols:/symbol_table/half_shape
    "<": [<, "<>", 《, "<br>"]
    ">": [">", "<>", 》, "</br>"]
    "/": [/, ÷]
    '"': "“”"
    "`": ["`", "```", "``````", "``"]
    "(": ["（）", "（", "()"]
    ")": ["（）", "）", "()"]
    "[": ["[]", "[", "【"]
    "]": ["[]", "]", "】"]
    "{": ["{}", "{", "「"]
    "}": ["{}", "}", "」"]


模糊音:
  __append:
    - derive/^l/n
    - derive/^n/l
    - derive/^y/r
    - derive/^r/y
    - derive/^h/f
    - derive/^f/h
    - derive/^r/l
    - derive/^l/r
    - derive/^k/g
    - derive/^g/k
    - derive/(ē|é|ě|è|e)ng(.*)$/$1n$2
    - derive/(ē|é|ě|è|e)n(.*)$/$1ng$2
    - derive/(ī||í|ǐ|ì|i)ng(.*)$/$1n$2
    - derive/(ī|í|ǐ|ì|i)n(.*)$/$1ng$2
    - derive/^c([^h]*)/ch$1
    - derive/^ch/c
    - derive/^z([^h]*)/zh$1
    - derive/^zh/z
    - derive/^s([^h]*)/sh$1
    - derive/^sh/s
