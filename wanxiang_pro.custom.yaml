patch:
  speller/algebra:
    __patch:
      - wanxiang_pro.schema:/自然码            # 可选输入方案名称：自然码, 自然龙, 小鹤双拼, 搜狗双拼, 微软双拼, 智能ABC, 紫光双拼, 国标双拼
      - wanxiang_pro.schema:/直接辅助            #辅助码升级为：直接辅助和间接辅助两种类型，都是句中任意，不同点在于直接辅助是nire=你  而间接则需要/引导  ni/re=你 ，在这个基础上直接辅助支持拼音后任意位置数字声调参与，间接辅助声调在/引导前参与
##########################以上格式受指令初始化控制，最好保持格式不变，如果发生变更请不要使用指令修改相关数据#####################################
    #通过下面的设置可以让你自己的文件引入而与仓库custom_phrase.txt不同，以后可以大胆覆盖更新
  custom_phrase/user_dict: custom_phrase_double    # 改成什么就需要手动创建 xxxxxx.txt 文件在用户目录，这个文件主要用于置顶，编码为自定义编码的词汇
  # custom_phrase/enable_completion: true # 补全提示,有效果,但是会使得较长的语句,尤其是个人信息语句的泄露
  user_dict_set/enable_completion: true # 补全提示 
  translator/packs/+:
    - userzhj                                  #导入根目录下名称为userxx.dict.yaml的自定义固定词典，编码要与固定词库一致（或者不写编码），形如姓名、专有名词公司名称等等
    #下面是候选数量，未来7890分别代表1234声，请候选长度不要大于6避免冲突
  menu/page_size: 6
  #生日信息：/sr或者osr，在这里定义全局替换构建你的生日查询数据库
  birthday_reminder:  #日期格式：必须是4位数字，格式为MMDD（月份和日期），例如：1月27日 → 0127 ，#备注格式：在日期后添加逗号，然后添加任意文本作为备注，例如："0501,我的好朋友"，也可以无备注
    solar_birthdays:  # 公历生日, 姓名: "日期,备注" or 姓名: "日期"
      周豪靖: "0121,准备礼物"
      周子悦: "0920"
      周子轶: "1230"
    lunar_birthdays:  # 农历生日, 姓名: "日期,备注" or 姓名: "日期"
      小明: "0114"
      小红: "0815,农历中秋"
  #下面用来改变你的windows小狼毫右下角软件图标
  #schema/+:
  #  icon: "icons/zhong.ico"
  #  ascii_icon: "icons/ying.ico"
  #下面这个可以改变tips上屏的按键
  key_binder/tips_key: "period"   #修改时候去default找，默认是句号
  # 然后, 将它替换为指向您新脚本的 "lua_translator@myshijian"。
  # engine/translators/@3: 
  #   lua_translator@*myshijian
  punctuator: 
    __include: wanxiang_symbols_zhj:/symbol_table #修改符号表的名称，默认是wanxiang_symbols_zhj
    digit_separators: ":." #修改数字后的标点符号状态.
  key_binder/sequence: # Lua 配置：手动排序的快捷键 super_sequence.lua，不要用方向键，各种冲突，一定要避免冲突
    up: "Control+j"    # 上移
    down: "Control+k"  # 下移
    reset: "Control+l" # 重置
    pin: "Control+p"   # 置顶
  #下面这个是修改快符的映射，按自己需求来
  quick_symbol_text:
    trigger: "^([a-z])/$"
    symkey:
      q: "repeat"
      w: "？"
      e: "（"
      r: "）"
      t: "~"
      y: "·"
      u: "『"
      i: "』"
      o: "〖"
      p: "〗"
      a: "！"
      s: "……"
      d: "、"
      f: "“"
      g: "”"
      h: "‘"
      j: "’"
      k: "【"
      l: "】"
      z: "。”"
      x: "？”"
      c: "！”"
      v: "——"
      b: "%"
      n: "《"
      m: "》"

  #通过在有候选的情况下，通过末尾检测到形如\a来触发为第一候选进行成对符号包裹例如nihao\c 候选[你好]
  #trigger只能设置为单符号，因为按下一次锁定第一候选，按下映射开始包裹符号pro用户不能设置为/
  paired_symbols:

    mirror: true   #包裹后完全替换第一候选true,原候选后移到第二false
    trigger: "\\"  #(注意反斜杠这是转义写法\\使用时\单反斜杠即可)
    symkey:
      a: "()"     #圆括号
      b: "[]"     #方括号
      c: "{}"     #花括号
      d: "<>"     #尖括号
      e: "\"\""   #英文双引号
      f: "''"     #英文单引号
      g: "``"     #反引号
      h: "「」"   #直角引号
      i: "『』"   #双直角引号
      j: "“”"     #中文弯双引号
      k: "‘’"     #中文弯单引号
      l: "《》"   #书名号（双）
      m: "〈〉"   #书名号（单）
      n: "（）"   #全角圆括号
      o: "【】"   #黑方头括号
      p: "〔〕"   #方头括号
      q: "｛｝"   #全角花括号
      r: "［］"   #全角方括号
      s: "〈〉"    #数学尖括号
      t: "⟨⟩"    #数学角括号
      u: "⦅⦆"    #白圆括号
      v: "⦇⦈"    #白方括号
      w: "❰❱"    #装饰角括号
      x: "⟪⟫"    #双角括号
      y: "«»"     #法文双书名号
      z: "‹›"     #法文单书名号
      #双字母：其余成对括号族
      aa: "〖〗"
      bb: "〘〙"
      cc: "〚〛"
      dd: "❨❩"
      ee: "❪❫"
      ff: "❬❭"
      gg: "⦉⦊"
      hh: "⦋⦌"
      ii: "⦍⦎"
      jj: "⦏⦐"
      kk: "⦑⦒"
      ll: "❮❯"
      mm: "⌈⌉"
      nn: "⌊⌋"
      oo: "⟦⟧"
      pp: "⟮⟯"
      qq: "⟬⟭"
      rr: "❲❳"
      ss: "⌜⌝"
      tt: "⌞⌟"
      uu: "⸢⸣"
      vv: "⸤⸥"
      ww: "﹁﹂"
      xx: "﹃﹄"
      yy: "⌠⌡"
      zz: "⟅⟆"
      #双字母：重复/运算/标记类
      md: "**"        #Markdown 粗体
      it: "__"        #Markdown 斜体（下划线风格）
      st: "~~"        #删除线
      eq: "=="
      pl: "++"
      mi: "--"
      sl: "//"
      bs: "\\\\"      #反斜杠对（Lua 里需写成 "\\\\")
      at: "@@"
      dl: "$$"
      pc: "%%"
      an: "&&"
      or: "||"
      cr: "^^"
      cl: "::"
      sc: ";;"
      ex: "!!"
      qu: "??"
  #下面这两个是快符的引导符号，前者用来引导符号、双击重复上屏符号，后者双击重复上屏汉字
  recognizer/patterns/quick_symbol: "^;.*$"
  #下面这个用来设置开启调频的时候哪些内容不调频
  translator/disable_user_dict_for_patterns: "^[a-z]{1,6}"
  # 取消注释以开启自动无词频造词
  add_user_dict/enable_auto_phrase: true

自然码提权:
  __append:
    - derive/^(.*?)(\d?);(bd|dw|df|dw|yl|rw|fs|iw)$/$1$3/
    - derive/^(.*?)(\d?);.*?,(bd|dw|df|dw|yl|rw|fs|iw)$/$1$3/
    - derive/^(.*?)(\d?);.*?,.*?,(bd|dw|df|dw|yl|rw|fs|iw)$/$1$3/
    - derive/^(.*?)(\d?);.*?,.*?,.*?,(bd|dw|df|dw|yl|rw|fs|iw)$/$1$3/

模糊音: 
  __append:
    # n - l
    - derive/^l/n
    - derive/^n/l
    # r - y     开头
    - derive/^y/r
    - derive/^r/y
    # h - f     开头
    - derive/^h/f
    - derive/^f/h
    # r - l     开头
    - derive/^r/l
    - derive/^l/r
    # k - g     开头
    - derive/^k/g
    - derive/^g/k
    # an - ang
    - derive/([ui]?)([āáǎàa])ng(.*)$/$1$2n$3
    - derive/([ui]?)([āáǎàa])n(.*)$/$1$2ng$3
    # en - eng
    - derive/([ēéěèe])ng(.*)$/$1n$2
    - derive/([ēéěèe])n(.*)$/$1ng$2
    # in - ing
    - derive/([īíǐìi])ng(.*)$/$1n$2
    - derive/([īíǐìi])n(.*)$/$1ng$2
    # c - ch
    - derive/^c([^h]*)/ch$1
    - derive/^ch/c
    # z - zh
    - derive/^z([^h]*)/zh$1
    - derive/^zh/z
    # s - sh
    - derive/^s([^h]*)/sh$1
    - derive/^sh/s