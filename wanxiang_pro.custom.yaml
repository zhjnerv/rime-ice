patch:
  speller/algebra:
    __patch:
      #- 模糊音                                  # 这里启用后，本文件末尾可配置具体条目
      - wanxiang_algebra:/pro/自然码 # 可选输入方案名称：自然码, 自然龙, 小鹤双拼, 搜狗双拼, 微软双拼, 智能ABC, 紫光双拼, 国标双拼
      - wanxiang_algebra:/pro/直接辅助 #辅助码升级为：直接辅助和间接辅助两种类型，都是句中任意，不同点在于直接辅助是nire=你  而间接则需要/引导  ni/re=你 ，在这个基础上直接辅助支持拼音后任意位置数字声调参与，间接辅助声调在/引导前参与
      - 自然码提权 #本文件末尾，有自然码和小鹤的可以用
  ##########################以上格式受指令初始化控制，最好保持格式不变，如果发生变更请不要使用指令修改相关数据#####################################
  #通过下面的设置可以让你自己的文件引入而与仓库custom_phrase.txt不同，防止更新时被仓库文件覆盖
  custom_phrase/user_dict: custom_phrase_double # 这里改成什么就需要手动创建同名的 custom_phrasexx.txt 文件在用户目录，这个文件主要用于置顶，编码为自定义编码的词汇
  custom_phrase/enable_completion: false # 开启自定义短语补全功能，默认关闭
  "engine/processors/@before 0": lua_processor@*custom_en_punct # 【自定义】独立标点转换，不随更新覆盖
  translator/packs/+:
    - userzhj # 导入根目录下名称为userzhj.dict.yaml的自定义固定词典
  translator/contextual_suggestions: false # 开启上下文预测

  # 英文自动加空格设置
  wanxiang_english/english_spacing: off
  wanxiang_english/spacing_timeout: 0

  #下面是候选数量，未来7890分别代表1234声，请候选长度不要大于6避免冲突
  menu/page_size: 6

  super_comment: # 超级注释模块，子项配置 true 开启，false 关闭
    candidate_length: 2 # 候选词辅助码提醒的生效长度，0为关闭  但同时清空其它，应当使用上面开关来处理
    corrector_type: "〔comment〕" # 随意更换左右括号，比如"〔comment〕" 不加括号为无括号，comment占位不能动
    chaifen: "〔chaifen〕" # 随意更换左右括号，比如"〔chaifen〕" 不加括号为无括号，chaifen占位不能动
    cand_type:
      user_phrase: "⁺"
      sentence: "∞"
      phrase: ""
      table: ""
      user_table: ""
      completion: ""
      abbrev: ""
      fallback: "~"

  super_processor:
    enable_backspace_limit: true # 开启/关闭退格限制
    enable_seg_loop: true # 开启/关闭分词符（'）循环
    enable_tone_fallback: true # 启用声调回退
    enable_predict_space: true # 启用联想空格打断，直接上屏空格并清空联想，对齐大厂
    kp_number_mode: auto # 小键盘模式 (auto / compose)
    limit_repeated: "8,40" #格式："最大重复声母数,最大候选字数"
    select_character: "[,]" # 开启以词定字，自动拆解第一位上屏首字，第二位上屏尾字
    # 下面这些写法都支持：
    # select_character: "[,]"                      # [ 上屏首字，] 上屏尾字（推荐）
    # select_character: "bracketleft, bracketright"  # [ 上屏首字，] 上屏尾字（英文全拼）

  # 下面这个快解除注释后就能用预测，下载地址：https://cnb.cool/amzxyz/rime-wanxiang/-/releases/download/model/wanxiang-lts-zh-hans-predict.db
  #'engine/processors/@before 0': predictor
  #'engine/translators/@before 0': predict_translator
  #switches/+:
  #  - name: prediction
  #    states: [ 预测关, 预测开 ]
  #predictor:
  #  db: wanxiang-lts-zh-hans-predict.db
  #  max_candidates: 10
  #  max_iterations: 1

  super_replacer:
    db_name: lua/replacer
    delimiter: "|"
    comment_format: "〔%s〕"
    chain: true #true表示流水线作业，上一个option产出交给下一个处理，典型的s2t>t2hk=s2hk，false就是并行，直接用text转换
    rules: # 兼容最新 schema，由 types 修改为 rules
      # 场景1：输入 '哈哈' -> 变成 '1.哈哈 2.😄'
      - option: emoji # 开关名称与上面开关名称保持一致
        mode: append # 新增候选append 替换原候选replace 替换注释comment 简码模式abbrev匹配输入编码置顶词组
        comment_mode: none # 注释模式: "append"(原候选注释继承), "text"(原候选文本放在注释), "none"(空，默认)
        tags: [abc] # 生效的tag
        prefix: "_em_" # 前缀用于区分同一个数据库的不同用途数据
        files:
          - lua/data/emoji.txt
      # 场景2：输入 'hello' -> 显示 'hello 〔你好 | 哈喽〕'
      - option: chinese_english
        mode: append # <--- 添加注释模式
        comment_mode: none
        tags: [abc]
        prefix: "_en_"
        files:
          - lua/data/english_chinese.txt
          - lua/data/chinese_english.txt
      # 场景3：用于常驻的直接替换 option: true
      - option: true
        mode: append # <--- 新增候选模式
        comment_mode: none
        tags: [abc]
        prefix: "_ot_"
        files:
          - lua/data/others.txt
      # 场景4：用于简繁转换的直接替换
      - option: [s2t, s2hk, s2tw] #后面依赖这条流水线有一个开关为true这条流水线就能工作
        mode: replace # <--- 替换原候选模式
        comment_mode: append
        sentence: true # <--- 句子级别替换
        tags: [abc]
        prefix: "_s2t_"
        files:
          - lua/data/STCharacters.txt
          - lua/data/STPhrases.txt
      - option: s2hk
        mode: replace # <--- 替换原候选模式
        comment_mode: append
        sentence: true # <--- 句子级别替换
        tags: [abc]
        prefix: "_s2hk_"
        files:
          - lua/data/HKVariants.txt
      - option: s2tw
        mode: replace # <--- 替换原候选模式
        comment_mode: append
        sentence: true # <--- 句子级别替换
        tags: [abc]
        prefix: "_s2tw_"
        files:
          - lua/data/TWVariants.txt
      - option: abbrev # 对应上面开关名称
        mode: abbrev
        tags: [abc]
        prefix: "_abbr_"
        abbrev_rule: "1,6"
        # 前置数量1，前置位置6,数量说的是你维护得数据库编码后面分割了几个词前几个要前置显示,位置说的是你要前置到第二候选还是第几
        # 然后空码或只有英文等自定义词组的时候直接全部兜底显示,这个新的设计简化的应用层面,我们只需要维护一个数据库即可.
        files:
          - lua/data/abbrev.txt
          - lua/data/chengyu.txt

  # 字符集过滤lua
  charset:
    - option: charset_filter
      base: a #可以填入多个类别如aj
      addlist:
        - "诶濛硷氽尛躝〇冇吔咗囧屌鲶芶咲畑垅𰻝𰻞"
      blacklist: []
    - option: s2t
      base: fa
      addlist: []
      blacklist: []
    - option: s2hk
      base: ha
      addlist: []
      blacklist: []
    - option: s2tw
      base: ta
      addlist: []
      blacklist: []

  # Tips 配置项
  tips:
    # 禁用的 tips 类型，初始化 tips 数据库的时候会直接忽略相关规则，修改部署后生效
    # 可选项为：偏旁，符号，化学式，时间，符号，组字，翻译，表情，货币，车牌, 单位
    disabled_types: []

  #shijian:仅仅作为提示使用，编码已经写死，引导键可以在key_binder下修改前缀
  date_formats:
    - "Y年m月d日"
    - "Y-m-d"
    - "Y/m/d"
    - "Y.m.d"
    - "Ymd"
    - "Y年n月j日"
    - "y年n月j日"
    - "n月j日"
  time_formats:
    - "H:M"
    - "H点M分"
    - "H:M:S"
    - "H时M分S秒"
    - "AI:M"
    - "I:M P"
  datetime_formats:
    - "Y-m-d H:M:S"
    - "Y-m-dTH:M:S O"
    - "YmdHMS"
    - "Y年m月d日 H点M分"
    - "y/m/d I:M p"

  #常规状态下数字转换成相应的字符，由超级preedit接管
  tone_preedit:
    "7": "¹"
    "8": "²"
    "9": "³"
    "0": "⁴"

  # 快符功能：
  quick_symbol_text:
    trigger: "^([a-z])/$"
    symkey:
      q: "repeat"
      w: "？"
      e: "（"
      r: "）"
      t: "~"
      y: "·"
      u: "『"
      i: "』"
      o: "〖"
      p: "〗"
      a: "！"
      s: "……"
      d: "、"
      f: "“"
      g: "”"
      h: "‘"
      j: "’"
      k: "【"
      l: "】"
      z: "。”"
      x: "？”"
      c: "！”"
      v: "——"
      b: "%"
      n: "《"
      m: "》"

  #通过在有候选的情况下，通过末尾检测到形如\a来触发为第一候选进行成对符号包裹
  paired_symbols:
    trigger: "\\" #(注意反斜杠这是转义写法\\使用时\单反斜杠即可)
    symkey:
      # ===== 基本括号与引号 =====
      a: "[]" # 方括号
      b: "【】" # 黑方头括号
      c: "❲❳" # 双大括号 / 装饰括号
      d: "〔〕" # 方头括号
      e: "⟮⟯" # 小圆括号 / 装饰括号
      f: "⟦⟧" # 双方括号 / 数学集群括号
      g: "「」" # 直角引号
      i: "『』" # 双直角引号
      j: "<>" # 尖括号
      k: "《》" # 书名号（双）
      l: "〈〉" # 书名号（单）
      m: "‹›" # 法文单书名号
      n: "«»" # 法文双书名号
      o: "⦅⦆" # 白圆括号
      p: "⦇⦈" # 白方括号
      q: "()" # 圆括号
      r: "|儿" # 用户自定义：儿化候选
      s: "［］" # 全角方括号
      t: "⟨⟩" # 数学角括号
      u: "〈〉" # 数学尖括号
      v: "❰❱" # 装饰角括号
      w: "（）" # 全角圆括号
      x: "｛｝" # 全角花括号
      y: "⟪⟫" # 双角括号
      z: "{}" # 花括号

      # ===== 扩展括号族 / 引号 =====
      dy: "''" # 英文单引号
      sy: '""' # 英文双引号
      zs: "“”" # 中文弯双引号
      zd: "‘’" # 中文弯单引号
      fy: "``" # 反引号

      # ===== 双字母括号族 =====
      aa: "〚〛" # 双中括号
      bb: "〘〙" # 双中括号（小）
      cc: "〚〛" # 双中括号（重复）
      dd: "❨❩" # 小圆括号装饰
      ee: "❪❫" # 小圆括号装饰
      ff: "❬❭" # 小尖括号装饰
      gg: "⦉⦊" # 双弯方括号
      ii: "⦍⦎" # 双弯方括号
      jj: "⦏⦐" # 双弯方括号
      kk: "⦑⦒" # 双弯方括号
      ll: "❮❯" # 小尖括号装饰
      mm: "⌈⌉" # 上取整 / 数学符号
      nn: "⌊⌋" # 下取整 / 数学符号
      oo: "⦗⦘" # 双方括号装饰
      pp: "⦙⦚" # 双方括号装饰
      qq: "⟬⟭" # 小双角括号
      rr: "❴❵" # 花括号装饰
      ss: "⌜⌝" # 数学上角符号
      tt: "⌞⌟" # 数学下角符号
      uu: "⸢⸣" # 装饰方括号
      vv: "⸤⸥" # 装饰方括号
      ww: "﹁﹂" # 中文书名号
      xx: "﹃﹄" # 中文书名号
      yy: "⌠⌡" # 数学 / 程序符号
      zz: "⟅⟆" # 数学 / 装饰括号

      # ===== Markdown / 标记 =====
      md: "**|**" # Markdown 粗体
      jc: "**|**" # 加粗
      it: "__|__" # 斜体
      st: "~~|~~" # 删除线
      eq: "==|==" # 高亮
      ln: "`|`" # 行内代码
      cb: "```|```" # 代码块
      qt: "> |" # 引用
      ul: "- |" # 无序列表项
      ol: "1. |" # 有序列表项
      lk: "[|](url)" # 链接
      im: "![|](img)" # 图片
      h: "# |" # 一级标题
      hh: "## |" # 二级标题
      hhh: "### |" # 三级标题
      hhhh: "#### |" # 四级标题
      sp: "\\|" # 反斜杠转义
      br: "|  " # 换行
      cm: "<!--|-->" # 注释

      # ===== 运算与标记符 =====
      pl: "++"
      mi: "--"
      sl: "//"
      bs: "\\\\"
      at: "@@"
      dl: "$$"
      pc: "%%"
      an: "&&"
      cr: "^^"
      cl: "::"
      sc: ";;"
      ex: "!!"
      qu: "??"
      sb: "sb"

  #下面这个可以改变tips上屏的按键
  key_binder/tips_key: "comma"
  key_binder/sequence:
    up: "Control+j"
    down: "Control+k"
    reset: "Control+l"
    pin: "Control+p"

  #开启自动无词频造词
  add_user_dict/enable_auto_phrase: true
  #开启用户词典长词组推荐
  user_dict_set/enable_completion: true

  # 标点符号覆盖
  punctuator/full_shape:
    __include: wanxiang_symbols:/symbol_table/full_shape
    "[": [「, 【, "[", "[]", 〔, ［]
    "]": [」, 】, "]", 〕, ］]
    "{": [『, 〖, "{}", ｛]

  punctuator/half_shape:
    __include: wanxiang_symbols:/symbol_table/half_shape
    "<": [<, "<>", 《, "<br>"]
    ">": [">", "<>", 》, "</br>"]
    "/": [/, ÷]
    '"': "“”"
    "`": ["`", "```", "``````", "``"]
    "(": ["（）", "（", "()"]
    ")": ["（）", "）", "()"]
    "[": ["[]", "[", "【"]
    "]": ["[]", "]", "】"]
    "{": ["{}", "{", "「"]
    "}": ["{}", "}", "」"]

#下面的数据有需要的可以patch引用
小鹤双拼提权:
  __append:
    - derive/^(.*?)(\d?);(bl|dx|df|eg|fn|kw|ny|tw|vw|yd|rx|fs|ix)$/$1$3/
    - derive/^(.*?)(\d?);.*?,(bl|dx|df|eg|fn|kw|ny|tw|vw|yd|rx|fs|ix)$/$1$3/

