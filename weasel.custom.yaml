customization:
  distribution_code_name: Weasel
  distribution_version: 0.15.0.0
  generator: "Weasel::UIStyleSettings"
  modified_time: "Thu Feb 22 18:21:42 2024"
  rime_version: 1.8.5
patch:
  "app_options/CDRAFT_M.exe":
    ascii_mode: true
  "app_options/Ditto.exe":
    ascii_mode: true
  "app_options/bash.exe":
    ascii_mode: true
  "app_options/cmd.exe":
    ascii_mode: true
  "preset_color_schemes/+":
    Catppuccin: {author: "缄默线", back_color: 0x3A2724, border_color: 0x3A2724, candidate_text_color: 0xF5D3CA, comment_text_color: 0x9FD4EE, hilited_back_color: 0x261918, hilited_candidate_back_color: 0x644D49, hilited_candidate_text_color: 0xD6DBF4, hilited_comment_text_color: 0x9FD4EE, hilited_label_color: 0xCBADA5, hilited_text_color: 0xF2AB89, label_color: 0xA28780, name: Catppuccin, shadow_color: 0xAA000000, text_color: 0xF5D3CA}
  "style/+":
    color_scheme: Catppuccin
    comment_font_face: "LXGW Wenkai Mono"
    comment_font_point: 22
    font_face: "Noto Emoji, LXGW Wenkai Mono"
    font_point: 26
    horizontal: false
    inline_preedit: false
    label_font_face: "LXGW Wenkai Mono"
    label_font_point: 23
    label_format: "%s."
    layout:
      align_type: bottom
      border: 3
      candidate_spacing: 5
      corner_radius: 8
      hilite_padding: 4
      hilite_spacing: 5
      margin_x: 8
      margin_y: 8
      min_width: 100
      round_corner: 8
      shadow_offset_x: 4
      shadow_offset_y: 4
      shadow_radius: 4
      spacing: 8
    
  # 原有文件 "style/color_scheme": Catppuccin

  "style/color_scheme": WeChat-keyboard # 网上下载的皮肤配置文件
  "preset_color_schemes/WeChat-keyboard":
    name: WeChat-keyboard # 配色取自微信键盘
    author: zsakvo
    back_color: 0xFFFFFF # 背景
    border_color: 0xDDDDDD # 边框
    text_color: 0x424242 #输入区文字颜色
    hilited_text_color: 0x424242 # 输入区高亮文字颜色
    hilited_back_color: 0xDDDDDD # 输入区高亮背景
    hilited_candidate_text_color: 0xFFFFFF # 第一候选项文字颜色
    hilited_candidate_back_color: 0x75B100 # 第一候选项背景颜色
    hilited_comment_text_color: 0x999999 # 注解文字高亮
    candidate_text_color: 0x525252 # 其他候选项文字颜色
    comment_text_color: 0x999999 # 其他候选项注解文字
    label_color: 0xcac9c8 # 预选栏编号颜色
    hilited_label_color: 0xFFFFFF #高亮候选区编号颜色
# 第二套配置皮肤
  "style/+":
    name: "MacOS 浅色/MacOS Light"
    font_face: "PingFangSC" # 字体及大小
    font_point: 16
    label_font_face: "PingFangSC" # 序号字体及大小
    label_font_point: 12
    comment_font_face: "PingFangSC" # 注字体及大小
    comment_font_point: 16
    candidate_format: "%c\u2005%@\u2005" # 编号 %c 和候选词 %@ 前后的空间
    candidate_list_layout: linear # 候选排布：层叠 stacked | 行 linear
    text_orientation: horizontal # 行文向： 横 horizontal | 纵 vertical
    inline_preedit: true # 拼音位于： 候选框 false | 行内 true
    translucency: false # 磨砂：false | true
    mutual_exclusive: false # 色不叠加：false | true
    border_height: 1 # 外边框 高
    border_width: 1 # 外边框 宽
    corner_radius: 5 # 外边框 圆角半径
    hilited_corner_radius: 5 # 选中框 圆角半径
    surrounding_extra_expansion: 0 # 候选项背景相对大小？
    shadow_size: 0 # 阴影大小
    line_spacing: 5 # 行间距
    base_offset: 0 # 字基高
    alpha: 1 # 透明度，0~1
    spacing: 10 # 拼音与候选项之间的距离 （ inline_preedit: false ）
    color_space: srgb # 色彩空间：srgb | display_p3
    back_color: 0xFFFFFF # 底色
    hilited_candidate_back_color: 0xD75A00 # 选中底色
    label_color: 0x999999 # 序号颜色
    hilited_candidate_label_color: 0xFFFFFF # 选中序号颜色
    candidate_text_color: 0x3c3c3c # 文字颜色
    hilited_candidate_text_color: 0xFFFFFF # 选中文字颜色
    comment_text_color: 0x999999 # 注颜色
    hilited_comment_text_color: 0xFFFFFF # 选中注颜色
    text_color: 0x424242 # 拼音颜色 （ inline_preedit: false ）
    hilited_text_color: 0xFFFFFF # 选中拼音颜色 （ inline_preedit: false ）
    candidate_back_color: 0xFFFFFF # 候选项底色
    # preedit_back_color: # 拼音底色 （ inline_preedit: false ）
    hilited_back_color: 0xD75A00 # 选中拼音底色 （ inline_preedit: false ）
    border_color: 0xFFFFFF # 外边框颜色
# 第三套皮肤
  "preset_color_schemes/+":
    microsoft_sim:
      name: 仿微软输入法
      author: plutotree
      back_color: 0xF4F4F4
      border_color: 0xDCDCDC
      text_color: 0x000000
      hilited_text_color: 0xF4F4F4
      hilited_back_color: 0xFFD8A6
      hilited_candidate_text_color: 0x000000
      hilited_candidate_back_color: 0xFFD8A6
      candidate_text_color: 0x000000
      comment_text_color: 0x888888
  style:
    color_scheme: microsoft_sim
    label_format: "%s"
    font_face: "微软雅黑"
    font_point: 14
    horizontal: true
    inline_preedit: true
    layout:
      min_width: 160
      min_height: 0
      border_width: 1
      border_height: 1
      margin_x: 12
      margin_y: 12
      spacing: 10
      candidate_spacing: 24
      hilite_spacing: 8
      hilite_padding: 12
      round_corner: 0


# 候选字的字体
#  "style/font_face": "HarmonyOS Sans SC Medium"
  "style/font_face": "MiSans"
#  "style/font_face": "Microsoft YaHei"
# 候选字的字体大小
  "style/font_point": 13
# 候选字横排 true / 纵排 false
  "style/horizontal": false
# 候选窗不显示内选区 (即拼音区)
  "style/inline_preedit": true
# 候选框边框粗细
  "style/layout/border": 1
# 候选框最小高度
#  "style/layout/min_height": 200
# 候选框宽度
  "style/layout/min_width": 60
# 候选字间隔
  "style/layout/candidate_spacing": 0
# 候选字背景色色块高度
#  "style/layout/hilite_padding": 4
# 候选字背景色色块宽度
  "style/layout/hilite_padding_x": 6
# 候选字背景色色块高度
  "style/layout/hilite_padding_y": 3
# 候选框左右边距
  "style/layout/margin_x": 11
# 候选框上下边距
  "style/layout/margin_y": 9
# 边框圆角半径
  "style/layout/corner_radius": 9
# 候选字背景色块圆角半径
  "style/layout/round_corner": 6
# 显示托盘图标
  "style/display_tray_icon": true
# 候选序号格式
  "style/label_format": "%s"
# 候选序号大小
  "style/label_font_point": 11
# 序号和候选字之间的间隔
  "style/layout/hilite_spacing": 4
