customization:
  distribution_code_name: Weasel
  distribution_version: 0.15.0.0
  generator: "Weasel::UIStyleSettings"
  modified_time: "2024-06-01 13:17:00"
  rime_version: 1.8.5

patch:
  "app_options/CDRAFT_M.exe":
    ascii_mode: true
  "app_options/Ditto.exe":
    ascii_mode: true
  "app_options/bash.exe":
    ascii_mode: true
  "app_options/cmd.exe":
    ascii_mode: true
  # 全局样式配置
  style:
    color_scheme: Catppuccin Frappe             
    color_scheme_dark: catppuccin_macchiato
    comment_font_face: "LXGW Wenkai Mono"
    comment_font_point: 22
    font_face: "Noto Emoji, LXGW Wenkai Mono"
    font_point: 26
    horizontal: false
    inline_preedit: false
    layout:
      align_type: bottom
      border: 3
      max_width: 400    # 候选框最大宽度，horizontal 布局如宽超此尺寸则换行显示候选，设置为 0 不启用此功能
      min_width: 60
      candidate_spacing: 5
      hilite_padding_x: 6
      hilite_padding_y: 2
      margin_x: 23
      margin_y: 8
      corner_radius: 8
      round_corner: 8
      hilite_padding: 4 
      hilite_spacing: 7
      shadow_offset_x: 4
      shadow_offset_y: 4
      shadow_radius: 4
      spacing: 13
    display_tray_icon: true
    label_font_face: "LXGW Wenkai Mono"
    label_format: "%s."
    label_font_point: 23

  # 配色方案
  preset_color_schemes/+:
    WeChat-keyboard:
      name: WeChat-keyboard
      author: zsakvo
      back_color: 0xFFFFFF
      border_color: 0xDDDDDD
      text_color: 0x424242
      hilited_text_color: 0x424242
      hilited_back_color: 0xDDDDDD
      hilited_candidate_text_color: 0xFFFFFF
      hilited_candidate_back_color: 0x75B100
      hilited_comment_text_color: 0x999999
      candidate_text_color: 0x525252
      comment_text_color: 0x999999
      label_color: 0x787878
      hilited_label_color: 0xFFFFFF
      shadow_color: "0xAA000000"

    Macos Light:
      name: "MacOS 浅色/MacOS Light"
      font_face: "PingFangSC"
      font_point: 16
      label_font_face: "PingFangSC"
      label_font_point: 12
      comment_font_face: "PingFangSC"
      comment_font_point: 16
      candidate_format: "%c\u2005%@\u2005"
      candidate_list_layout: linear
      text_orientation: horizontal
      inline_preedit: false
      translucency: false
      mutual_exclusive: false
      border_height: 1
      border_width: 1
      corner_radius: 5
      hilited_corner_radius: 5
      surrounding_extra_expansion: 0
      shadow_size: 0
      line_spacing: 5
      base_offset: 0
      alpha: 1
      spacing: 10
      color_space: srgb
      back_color: 0xFFFFFF
      hilited_candidate_back_color: 0xD75A00
      label_color: 0x999999
      hilited_candidate_label_color: 0xFFFFFF
      candidate_text_color: 0x3c3c3c
      hilited_candidate_text_color: 0xFFFFFF
      comment_text_color: 0x999999
      hilited_comment_text_color: 0xFFFFFF
      text_color: 0x424242
      hilited_text_color: 0xFFFFFF
      candidate_back_color: 0xFFFFFF
      hilited_back_color: 0xD75A00
      border_color: 0xFFFFFF
      shadow_color: "0xAA000000"

    microsoft_sim:
